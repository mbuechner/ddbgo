[www]
; Tune FPM worker pool for Drupal request concurrency.
pm = dynamic
pm.max_children = 20
; Keep a slightly larger warm pool to reduce spawn latency on short spikes.
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 8
; Recycle workers a bit earlier to limit memory fragmentation over time.
pm.max_requests = 300

; Enable runtime diagnostics for capacity and slow request analysis.
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong
request_slowlog_timeout = 15s
slowlog = /proc/self/fd/2
catch_workers_output = yes

; Helps avoid workers hanging forever on bad upstream calls.
request_terminate_timeout = 180s
